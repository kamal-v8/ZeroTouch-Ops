apiVersion: apps/v1
kind: Deployment
metadata: 
 name: {{ .Release.Name }}-backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
     app: backend
  template:
    metadata:
      labels:
        app: backend

    spec:
     containers:
       - name: backend
         image: " {{ .Values.image.repository }}:{{ .Values.image.tag}}"
         ports:
           - containerPort: 5000


      # security (not to run as root )
         securityContext:
           runAsNonRoot: true
           readOnlyRootFilesystem: true

      #resource limits
         resources:
           requests:
             cpu: "100m"
             memory:  "128Mi"
           limits:
             cpu: "250m"
             memory: "256Mi"
   
   # Self healing thing
         livenessProbe:
           httpGet:
             path: /api/health
             port: 5000
           initialDelaySeconds: 10
           periodSeconds: 10
        
