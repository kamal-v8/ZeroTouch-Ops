apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: coffee-app
  labels:
    app: coffee-backend # Added: ServiceMonitor needs this label in METADATA, not just selector
spec:
  selector:
    app: coffee-backend
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
