services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

  api:
    build: ./api
    ports:
      - "3001:3001"
    restart: always
    command: /bin/sh -c "until npx prisma db push; do echo 'Waiting for DB...'; sleep 2; done && npm start"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/ecommerce
      REDIS_HOST: redis
      JWT_SECRET: mysecretkey
    depends_on:
      - db
      - redis

  worker:
    build: ./worker
    restart: always
    command: /bin/sh -c "until npx prisma db push; do echo 'Waiting for DB...'; sleep 2; done && npm start"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/ecommerce
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api

volumes:
  db_data:
