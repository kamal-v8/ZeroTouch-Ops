services:
  nginx-edge:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - zapty-network
    depends_on:
      - frontend
      - backend

  frontend:
    build: ./frontend
    networks:
      - zapty-network

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://user:pass@db-primary:5432/zapty
      - REDIS_URL=redis://redis:6379/0
    networks:
      - zapty-network
    depends_on:
      - db-primary
      - redis

  db-primary:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=zapty
    volumes:
      - db-primary-data:/var/lib/postgresql/data
    networks:
      - zapty-network

  db-replica:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=zapty
    networks:
      - zapty-network
    depends_on:
      - db-primary

  redis:
    image: redis:7-alpine
    networks:
      - zapty-network

networks:
  zapty-network:
    driver: bridge

volumes:
  db-primary-data:
